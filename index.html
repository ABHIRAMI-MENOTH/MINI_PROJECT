<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">

  <title>Traffic Sign Chatbot</title>
  
</head>
<body>
  <div class="container">
    <h1>🚦 Traffic Sign Recognition</h1>
    <div class="upload-box">
      <form method="POST" enctype="multipart/form-data">
        <p><input type="file" name="file"></p>
        <button class="btn" type="submit">Predict Sign</button>
      </form>
      {% if file_path %}
        <h3>Uploaded Image:</h3>
        <img src="{{ file_path }}" width="150"><br>
      {% endif %}
      {% if prediction %}
        <h3>Predicted Sign: {{ prediction }}</h3>
        <p>Confidence: {{ confidence }}%</p>
      {% endif %}

      <!--  New Camera Button -->
      <p>Or try live camera capture:</p>
      <a href="/camera" class="btn">Use Camera</a>
    </div>
  </div>

  <!-- Chatbot -->
  <div class="chatbot-icon" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png" alt="Chat">
  </div>

  <div class="chatbot-box" id="chatbot-box">
    <div class="chat-header">💬 Traffic Sign Chatbot</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input">
      <input type="text" id="user-message" placeholder="Ask about a sign...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    function toggleChat() {
      const box = document.getElementById("chatbot-box");
      box.style.display = box.style.display === "flex" ? "none" : "flex";
    }

    function appendMessage(sender, message) {
      const messages = document.getElementById("chat-messages");
      const div = document.createElement("div");
      div.innerHTML = `<b>${sender}:</b> ${message}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById("user-message");
      const message = input.value.trim();
      if (!message) return;

      appendMessage("You", message);
      input.value = "";

      fetch("/chatbot", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: message })
      })
      .then(res => res.json())
      .then(data => {
        appendMessage("Chatbot", data.response);
      })
      .catch(err => console.error("Error:", err));
    }
  </script>
</body>
</html>
