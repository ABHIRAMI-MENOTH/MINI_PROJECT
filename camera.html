<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Sign Camera</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: #e9ecef;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      text-align: center;
      width: 450px;
    }

    h1 {
      margin-bottom: 20px;
      color: #343a40;
      font-size: 24px;
    }

    video {
      border-radius: 12px;
      width: 100%;
      max-width: 400px;
      height: auto;
      border: 2px solid #ced4da;
    }

    .btn {
      padding: 12px 25px;
      margin: 10px 5px 0;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #007bff, #00c6ff);
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: linear-gradient(45deg, #0056b3, #0096c7);
    }

    .result-box {
      margin-top: 20px;
      background: #f1f3f5;
      padding: 15px;
      border-radius: 12px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
    }

    .result-box img {
      margin-top: 10px;
      border-radius: 12px;
      border: 1px solid #ced4da;
      width: 150px;
    }

    #prediction {
      font-weight: bold;
      color: #212529;
    }

    #confidence {
      color: #495057;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚦 Traffic Sign Camera</h1>

    <video id="camera" autoplay></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div>
      <button class="btn" id="capture-btn" onclick="capture()">Capture</button>
      <button class="btn" id="retake-btn" onclick="retake()" style="display:none;">Retake</button>
      <a href="/" class="btn">Home</a>
    </div>

    <div class="result-box">
      <h3 id="prediction"></h3>
      <p id="confidence"></p>
      <img id="captured-image" src="" style="display:none;">
    </div>
  </div>

  <script>
    const video = document.getElementById('camera');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const capturedImg = document.getElementById('captured-image');

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => { video.srcObject = stream; })
      .catch(err => alert("Error accessing camera: " + err));

    function capture() {
      canvas.width = video.videoWidth || 400;
      canvas.height = video.videoHeight || 300;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      canvas.toBlob(blob => {
        if (!blob) {
          const dataURL = canvas.toDataURL("image/png");
          const byteString = atob(dataURL.split(',')[1]);
          const arrayBuffer = new ArrayBuffer(byteString.length);
          const intArray = new Uint8Array(arrayBuffer);
          for (let i = 0; i < byteString.length; i++) intArray[i] = byteString.charCodeAt(i);
          blob = new Blob([intArray], { type: "image/png" });
        }

        capturedImg.src = URL.createObjectURL(blob);
        capturedImg.style.display = "block";
        captureBtn.style.display = "none";
        retakeBtn.style.display = "inline-block";

        const formData = new FormData();
        formData.append("file", blob, "capture.png");

        fetch("/predict_camera", { method: "POST", body: formData })
          .then(res => res.json())
          .then(data => {
            document.getElementById("prediction").innerText = "Predicted Sign: " + data.result;
            document.getElementById("confidence").innerText = "Confidence: " + data.confidence + "%";
          })
          .catch(err => console.error("Error:", err));
      }, "image/png");
    }

    function retake() {
      capturedImg.style.display = "none";
      captureBtn.style.display = "inline-block";
      retakeBtn.style.display = "none";
      document.getElementById("prediction").innerText = "";
      document.getElementById("confidence").innerText = "";
    }
  </script>
</body>
</html>
